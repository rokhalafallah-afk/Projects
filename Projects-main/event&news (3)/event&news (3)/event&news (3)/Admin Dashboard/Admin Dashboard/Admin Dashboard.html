<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <div class="sidebar">
    <h2>Admin Panel</h2>
    <ul>
      <li><a href="#" data-section="users">Users</a></li>
      <li><a href="#" data-section="reports">Reports</a></li>
      <li><a href="#" data-section="settings">Settings</a></li>
    </ul>
  </div>

  <div class="main">
    <header>
      <h1>Dashboard</h1>
    </header>

    <!-- Users Section -->
    <section id="users" class="card">
      <h2>User Management</h2>
      <table id="userTable">
        <thead>
          <tr><th>ID</th><th>Name</th><th>Role</th></tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>

    <!-- Reports Section -->
    <section id="reports" class="card" style="display:none">
      <h2>Reports</h2>
      <p>Here you can display charts, analytics, or summaries.</p>
    </section>

    <!-- Settings Section -->
    <section id="settings" class="card" style="display:none">
      <h2>Settings</h2>
      <p>Configuration options will go here.</p>
    </section>
  </div>

  <script src="assets/script.js"></script>
</body>
</html>
